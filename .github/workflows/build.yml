name: build-orbita

# Build les 3 OS (Linux, Windows, macOS) et publie une Release GitHub avec les installeurs + les binaires
# PORTABLES (Win .exe, macOS .app.tar.gz, Linux .AppImage) que le Launcher Epicube télécharge et lance.
on:
  workflow_dispatch:
  push:
    tags: ['orbita-v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest       # .dmg + .app (universel Intel + Apple Silicon)
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04        # .AppImage (portable) + .deb
            args: ''
          - platform: windows-latest      # .msi/.exe (installeurs) + orbita-desktop.exe (portable)
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Dépendances Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libssl-dev libayatana-appindicator3-dev

      - name: Build + Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: orbita-v__VERSION__
          releaseName: 'Orbita Desktop v__VERSION__'
          releaseBody: "Application desktop Orbita — coquille native de gestion.epicube.ch. Distribuée via le Launcher Epicube."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # ---- Binaires PORTABLES additionnels (pour le launcher : télécharge + lance directement) ----
      - name: Portable Windows (.exe)
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          gh release upload "orbita-v${VERSION}" \
            "src-tauri/target/release/orbita-desktop.exe#Orbita-windows.exe" --clobber

      - name: Portable macOS (.app.tar.gz)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          APP=$(find src-tauri/target -type d -name 'Orbita.app' | head -1)
          tar -C "$(dirname "$APP")" -czf Orbita-macos.app.tar.gz "Orbita.app"
          gh release upload "orbita-v${VERSION}" "Orbita-macos.app.tar.gz" --clobber
