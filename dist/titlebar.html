<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbita — barre</title>
    <style>
      :root {
        --bg: #0a0d2a; --ink: #eef1ff; --muted: #97a0d0;
        --primary: #5865f2; --primary2: #7f5af0; --hair: rgba(255,255,255,.08);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; }
      body {
        font-family: Inter, "Segoe UI", system-ui, sans-serif; color: var(--ink);
        background: #0a0d2a;
        -webkit-user-select: none; user-select: none;
      }
      .bar {
        height: 38px; display: flex; align-items: center; justify-content: space-between;
        padding: 0 6px 0 16px; border-bottom: 1px solid var(--hair);
        background: linear-gradient(180deg, #141a4a, #0a0d2a);
      }
      .brand { font-weight: 800; letter-spacing: .06em; font-size: 14px; display: flex; align-items: center; gap: 8px; }
      .brand .dot { width: 16px; height: 16px; }
      .brand span { background: linear-gradient(90deg, var(--primary), var(--primary2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .drag { flex: 1; height: 100%; }
      .win-controls { display: flex; align-items: center; gap: 2px; }
      .win-btn {
        width: 40px; height: 30px; display: grid; place-items: center; border: none; border-radius: 8px;
        background: transparent; color: var(--muted); cursor: pointer; transition: background .12s, color .12s;
      }
      .win-btn:hover { background: rgba(255,255,255,.08); color: var(--ink); }
      .win-btn.close:hover { background: #e13b4c; color: #fff; }
      .win-btn svg { width: 15px; height: 15px; }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="brand" data-tauri-drag-region>
        <svg class="dot" viewBox="0 0 24 24" fill="none" stroke="#7f5af0" stroke-width="2"><circle cx="12" cy="12" r="4"/><ellipse cx="12" cy="12" rx="10" ry="4.5" transform="rotate(-30 12 12)"/></svg>
        EPICUBE <span>ORBITA</span>
      </div>
      <div class="drag" data-tauri-drag-region></div>
      <div class="win-controls">
        <button id="winMin" class="win-btn" title="Réduire" aria-label="Réduire">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="winMax" class="win-btn" title="Agrandir" aria-label="Agrandir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
        </button>
        <button id="winClose" class="win-btn close" title="Fermer" aria-label="Fermer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>
    </div>
    <script>
      const T = window.__TAURI__ || {};
      const win = (T.window && T.window.getCurrentWindow) ? T.window.getCurrentWindow() : null;
      const $ = (id) => document.getElementById(id);
      if (win) {
        $("winMin").onclick = () => win.minimize();
        $("winMax").onclick = () => win.toggleMaximize();
        $("winClose").onclick = () => win.close();
        // Déplacement de la fenêtre : glisser sur les zones marquées data-tauri-drag-region.
        document.querySelectorAll("[data-tauri-drag-region]").forEach((el) => {
          el.addEventListener("mousedown", (e) => {
            if (e.button === 0) { e.preventDefault(); win.startDragging(); }
          });
          el.addEventListener("dblclick", () => win.toggleMaximize());
        });
      }
    </script>
  </body>
</html>
